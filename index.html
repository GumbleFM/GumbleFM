<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GumbleFM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#0a0a0a,#1b1b1b);

color:white;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.card{

width:95%;
max-width:700px;

background:#181818;

padding:40px;

border-radius:20px;

box-shadow:0 0 30px rgba(0,255,120,.25);

text-align:center;

}

.logo{

font-size:65px;

font-weight:bold;

color:#18d218;

margin-bottom:10px;

}

.slogan{

color:#bbbbbb;

margin-bottom:35px;

font-size:20px;

}

.status{

display:inline-block;

background:#18d218;

color:black;

padding:8px 18px;

border-radius:30px;

font-weight:bold;

margin-bottom:25px;

}

iframe{

border:none;

width:100%;

height:240px;

border-radius:15px;

background:black;

}

.info{

margin-top:35px;

display:flex;

justify-content:space-around;

flex-wrap:wrap;

gap:20px;

}

.box{

background:#232323;

padding:20px;

border-radius:15px;

min-width:180px;

}

.box h2{

font-size:18px;

margin-bottom:10px;

color:#18d218;

}

footer{

margin-top:40px;

color:#777;

font-size:14px;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
📻 GUMBLE FM
</div>

<div class="slogan">
A banda sonora da tua viagem.
</div>

<div class="status">
🟢 EM DIRETO
</div>

<iframe src="https://cloud.caster.fm/player/a237b501-f835-481a-be34-d56fd3a97469"></iframe>

<div class="info">

<div class="box">
<h2>🎵 Emissão</h2>
24 Horas
</div>

<div class="box">
<h2>🇵🇹 Géneros</h2>
Rap • Rock • DnB • Música Portuguesa
</div>

<div class="box">
<h2>🚛 Especial</h2>
Euro Truck Simulator 2
</div>

</div>

<footer>

© 2026 GumbleFM

</footer>

</div>

</body>
</html>
