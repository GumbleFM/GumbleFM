<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GumbleFM</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<header>

<div class="logo">
GUMBLE<span>FM</span>
</div>

<div class="live-badge">
<span class="dot"></span>
LIVE
</div>

</header>

<main>

<h1>A banda sonora da tua viagem.</h1>

<p class="subtitle">
Rap Português • Rap Internacional • Drum & Bass • Rock • Música Portuguesa
</p>

<section class="player">

<div class="cover">

<div class="vinyl">

🎵

</div>
<h2>🔴 Em direto</h2>

<audio controls autoplay preload="none" style="width:100%;">
    <source src="http://uk3freenew.listen2myradio.com:20795/" type="audio/mpeg">
    O teu navegador não suporta áudio.
</audio>
</div>

<div class="info">

<h2 id="song">
A carregar música...
</h2>

<p id="listeners">
A carregar ouvintes...
</p>

<div class="controls">

<button id="playButton">

▶

</button>

<input
type="range"
id="volume"
min="0"
max="100"
value="100">

</div>

<audio id="radio">

<source
src="https://sapircast.caster.fm:17323/OV5rn"
type="audio/mpeg">

</audio>

</div>

</section>

<section class="cards">

<div class="card">

<h3>EMISSÃO</h3>

<p>24 Horas</p>

</div>

<div class="card">

<h3>ESTILO</h3>

<p>Urban Radio</p>

</div>

<div class="card">

<h3>PAÍS</h3>

<p>Portugal 🇵🇹</p>

</div>

</section>

</main>

<footer>

© 2026 GumbleFM

</footer>

<script src="script.js"></script>

</body>

</html>
