<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GumbleFM</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="background"></div>

<header>

<div class="logo">
GUMBLE<span>FM</span>
</div>

<div class="live">
● LIVE
</div>

</header>

<main>

<h1>A banda sonora da tua viagem.</h1>

<p class="subtitle">
Rap Português • Rap Internacional • DnB • Rock • Música Portuguesa
</p>

<div class="player-box">

<div class="player-box">

    <div class="player">

        <div class="player-status">
            <span class="live-dot">🔴 LIVE</span>
        </div>

        <h2 id="song-title">
            A carregar música...
        </h2>

        <p id="listeners">
            A carregar ouvintes...
        </p>

        <audio id="radioPlayer" controls preload="none">
            <source src="https://sapircast.caster.fm:17323/OV5rn" type="audio/mpeg">
            O teu navegador não suporta áudio.
        </audio>

    </div>

</div>

<div class="stats">

<div class="card">
<h3>EMISSÃO</h3>
<p>24 Horas</p>
</div>

<div class="card">
<h3>ESTILO</h3>
<p>Urban Radio</p>
</div>

<div class="card">
<h3>PAÍS</h3>
<p>Portugal</p>
</div>

</div>

</main>

<footer>

© 2026 GumbleFM

</footer>

<script src="script.js"></script>

</body>
</html>
