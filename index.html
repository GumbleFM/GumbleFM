<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GumbleFM</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background"></div>

<header>

<div class="logo">
GUMBLE<span>FM</span>
</div>

<div class="live-badge">
<span class="dot"></span>
LIVE
</div>

</header>

<main>

<h1>A banda sonora da tua viagem.</h1>

<p class="subtitle">
Rap Português • Rap Internacional • Drum & Bass • Rock • Música Portuguesa
</p>

<section class="player">

<div class="cover">

<div class="vinyl">
🎵
</div>

<h2>🔴 Em direto</h2>

<iframe
    src="https://gumblefm.radio12345.com"
    width="100%"
    height="120"
    scrolling="no"
    style="border:none;overflow:hidden;border-radius:12px;"
    allow="autoplay">
</iframe>

</div>

<div class="info">

<h2>GumbleFM</h2>

<p>Emissão em direto</p>

</div>

</section>

<section class="cards">

<div class="card">
<h3>EMISSÃO</h3>
<p>24 Horas</p>
</div>

<div class="card">
<h3>ESTILO</h3>
<p>Urban Radio</p>
</div>

<div class="card">
<h3>PAÍS</h3>
<p>Portugal 🇵🇹</p>
</div>

</section>

</main>

<footer>

© 2026 GumbleFM

</footer>

</body>

</html>
