<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Painel GumbleFM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial,sans-serif;
padding:40px;
}

.comment{

background:#1c1c1c;
padding:20px;
margin-bottom:20px;
border-radius:15px;
border-left:5px solid #1DB954;

}

button{

padding:10px 18px;
margin-right:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}

.approve{

background:#1DB954;
color:white;

}

.delete{

background:#ff3b3b;
color:white;

}

</style>

</head>

<body>

<div id="login">

<h1>Painel GumbleFM</h1>

<input
id="email"
type="email"
placeholder="Email">

<br><br>

<input
id="password"
type="password"
placeholder="Password">

<br><br>

<button onclick="login()">
Entrar
</button>

</div>

<div id="panel" style="display:none;">

<h1>Comentários Pendentes</h1>

<button onclick="logout()">
Logout
</button>

<br><br>

<div id="comments"></div>

</div>

<script>
const supabase = window.supabase.createClient(
'https://ojoeyvevtphcswnmfoyq.supabase.co',
'sb_publishable_0NKGnNx-l4L_DArnEy9QPQ_SRzZzd8B'
);

async function loadComments(){

const {data,error}=await supabase
.from('comments')
.select('*')
.eq('approved',false)
.order('created_at',{ascending:false});

const container=document.getElementById('comments');

container.innerHTML='';

if(error){

container.innerHTML='<p>Erro ao carregar comentários.</p>';
return;

}

data.forEach(comment=>{

container.innerHTML+=`
<div class="comment">

<h3>${comment.name}</h3>

<p>${comment.message}</p>

<button class="approve" onclick="approve(${comment.id})">
Aprovar
</button>

<button class="delete" onclick="removeComment(${comment.id})">
Eliminar
</button>

</div>
`;

});

}

async function approve(id){

await supabase
.from('comments')
.update({approved:true})
.eq('id',id);

loadComments();

}

async function removeComment(id){

await supabase
.from('comments')
.delete()
.eq('id',id);

loadComments();

}

loadComments();

async function login(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

const {data,error}=await supabase.auth.signInWithPassword({
email,
password
});

console.log(data);
console.log(error);

if(error){
alert(error.message);
return;
}

checkUser();

}
  
async function logout(){

await supabase.auth.signOut();
location.reload();

}

async function checkUser(){

const {data}=await supabase.auth.getUser();

if(data.user){

document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";

loadComments();

}

}

</script>


</body>

</html>
